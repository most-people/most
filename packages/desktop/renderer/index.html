<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Most Box - P2P 文件分享</title>
    <style>
      :root {
        --bg-primary: #f5f5f7;
        --bg-secondary: #fff;
        --bg-tertiary: #f2f2f7;
        --bg-item: #f9f9fb;
        --text-primary: #1d1d1f;
        --text-secondary: #333;
        --text-tertiary: #86868b;
        --text-muted: #aeaeb2;
        --border-color: #d2d2d7;
        --titlebar-bg: #1d1d1f;
        --titlebar-text: #fff;
        --accent: #0071e3;
        --accent-hover: #0077ed;
        --success: #34c759;
        --error: #ff3b30;
        --shadow: rgba(0, 0, 0, 0.05);
      }
      
      [data-theme="dark"] {
        --bg-primary: #1c1c1e;
        --bg-secondary: #2c2c2e;
        --bg-tertiary: #3a3a3c;
        --bg-item: #3a3a3c;
        --text-primary: #f5f5f7;
        --text-secondary: #e5e5e7;
        --text-tertiary: #98989d;
        --text-muted: #636366;
        --border-color: #48484a;
        --titlebar-bg: #2c2c2e;
        --titlebar-text: #f5f5f7;
        --shadow: rgba(0, 0, 0, 0.3);
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--text-muted);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-tertiary);
      }
      
      html, body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        transition: background 0.2s, color 0.2s;
      }
      /* Titlebar Styles */
      .titlebar {
        height: 32px;
        background: var(--titlebar-bg);
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 9999;
        -webkit-app-region: drag;
        transition: background 0.2s;
      }
      .titlebar-drag-area {
        flex: 1;
        display: flex;
        align-items: center;
        padding-left: 12px;
        gap: 12px;
      }
      .titlebar-title {
        color: var(--titlebar-text);
        font-size: 13px;
        font-weight: 500;
      }
      .titlebar-controls {
        display: flex;
        -webkit-app-region: no-drag;
      }
      .titlebar-btn {
        width: 46px;
        height: 32px;
        border: none;
        background: transparent;
        color: var(--titlebar-text);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
        -webkit-app-region: no-drag;
      }
      .titlebar-btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .titlebar-btn.close:hover {
        background: #ff3b30;
      }
      /* Content Area */
      .content {
        margin-top: 32px;
        height: calc(100vh - 32px);
        overflow-y: auto;
        padding: 20px;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
      }
      h1 {
        text-align: center;
        color: var(--text-primary);
        margin-bottom: 40px;
        margin-top: 0;
      }
      .card {
        background: var(--bg-secondary);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 24px;
        box-shadow: 0 4px 12px var(--shadow);
        transition: background 0.2s, box-shadow 0.2s;
      }
      h2 {
        margin-top: 0;
        font-size: 1.2rem;
        color: var(--text-secondary);
      }
      .input-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 16px;
      }
      input[type="text"] {
        padding: 12px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 14px;
        background: var(--bg-tertiary);
        color: var(--text-primary);
        transition: background 0.2s, border-color 0.2s, color 0.2s;
      }
      input[type="text"]::placeholder {
        color: var(--text-tertiary);
      }
      input[type="text"]:focus {
        outline: none;
        border-color: var(--accent);
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 12px 20px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: var(--accent-hover);
      }
      button:disabled {
        background: var(--text-muted);
        cursor: not-allowed;
      }
      .success {
        color: var(--success);
        font-weight: 600;
      }
      .error {
        color: var(--error);
        font-weight: 600;
      }
      #taskStatus {
        background: var(--bg-tertiary);
        padding: 12px;
        border-radius: 8px;
        font-family: monospace;
        font-size: 12px;
        white-space: pre-wrap;
        margin-top: 16px;
        display: none;
        color: var(--text-secondary);
      }
      .peer-info {
        font-size: 12px;
        color: var(--text-tertiary);
        margin-bottom: 8px;
        text-align: center;
      }
      .network-status {
        font-size: 12px;
        color: var(--text-tertiary);
        margin-bottom: 20px;
        text-align: center;
      }
      #selectedFileInfo {
        background: var(--bg-tertiary);
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        color: var(--text-secondary);
        white-space: pre-wrap;
        display: none;
      }
      .btn-group {
        display: flex;
        gap: 10px;
      }
      /* 已发布文件列表样式 */
      .published-list {
        list-style: none;
        padding: 0;
        margin: 16px 0 0 0;
      }
      .published-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px;
        background: var(--bg-item);
        border-radius: 8px;
        margin-bottom: 8px;
        gap: 12px;
        transition: background 0.2s;
      }
      .published-item:hover {
        background: var(--bg-tertiary);
      }
      .published-item-info {
        flex: 1;
        min-width: 0;
      }
      .published-item-name {
        font-weight: 600;
        font-size: 14px;
        color: var(--text-primary);
        margin-bottom: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .published-item-link {
        font-family: monospace;
        font-size: 12px;
        color: var(--text-tertiary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .published-item-time {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
      }
      .published-item-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }
      .published-item-actions button {
        padding: 6px 12px;
        font-size: 12px;
        border-radius: 6px;
      }
      .btn-copy {
        background: var(--accent);
      }
      .btn-delete {
        background: var(--error);
      }
      .btn-delete:hover {
        background: #ff453a;
      }
      .empty-state {
        text-align: center;
        color: var(--text-tertiary);
        padding: 24px;
        font-size: 14px;
      }
      .btn-refresh {
        background: var(--success);
        font-size: 13px;
        padding: 8px 16px;
      }
      .btn-refresh:hover {
        background: #30d158;
      }
      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .theme-controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 20px;
        font-size: 13px;
        color: var(--text-tertiary);
      }
      .theme-btn-page {
        padding: 6px 12px;
        font-size: 12px;
        border-radius: 6px;
        background: var(--bg-tertiary);
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
        cursor: pointer;
        transition: all 0.2s;
      }
      .theme-btn-page:hover {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .theme-btn-page.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="titlebar">
      <div class="titlebar-drag-area">
        <span class="titlebar-title">Most Box</span>
      </div>
      <div class="titlebar-controls">
        <button class="titlebar-btn minimize" id="minimizeBtn" title="最小化">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="2" fill="currentColor"/></svg>
        </button>
        <button class="titlebar-btn maximize" id="maximizeBtn" title="最大化">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button class="titlebar-btn close" id="closeBtn" title="关闭">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </div>
    </div>
    <div class="content">
    <div class="peer-info" id="nodeId">正在初始化 P2P 节点...</div>
    <div class="network-status" id="networkStatus">网络状态: 等待连接...</div>
    
    <div class="theme-controls">
      <span>主题：</span>
      <button class="theme-btn-page" id="themeSystem">跟随系统</button>
      <button class="theme-btn-page" id="themeLight">浅色</button>
      <button class="theme-btn-page" id="themeDark">深色</button>
    </div>

    <div class="card">
      <h2>发布文件</h2>
      <div class="input-group">
        <input type="file" id="fileInput" style="display: none;" />
        <div class="btn-group">
          <button id="selectFileBtn">选择文件</button>
          <button id="publishBtn" disabled>发布到 P2P 网络</button>
        </div>
        <div id="selectedFileInfo"></div>
        <div id="publishResult"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>已发布文件</h2>
        <button class="btn-refresh" id="refreshPublishedBtn">刷新列表</button>
      </div>
      <div id="publishedFilesList">
        <div class="empty-state">暂无已发布的文件</div>
      </div>
    </div>

    <div class="card">
      <h2>下载文件</h2>
      <div class="input-group">
        <input type="text" id="linkInput" placeholder="请输入 most://<cid> 链接" />
        <button id="downloadBtn">开始 P2P 下载</button>
        <div id="downloadResult"></div>
        <div id="taskStatus"></div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
    </div>
  </body>
</html>
