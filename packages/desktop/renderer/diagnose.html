<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网络诊断 - Most Box</title>
    <style>
      :root {
        --bg-primary: #f5f5f7;
        --bg-secondary: #fff;
        --bg-tertiary: #f2f2f7;
        --bg-item: #f9f9fb;
        --text-primary: #1d1d1f;
        --text-secondary: #333;
        --text-tertiary: #86868b;
        --text-muted: #aeaeb2;
        --border-color: #d2d2d7;
        --titlebar-bg: #1d1d1f;
        --titlebar-text: #fff;
        --accent: #0071e3;
        --accent-hover: #0077ed;
        --success: #34c759;
        --warning: #ff9500;
        --error: #ff3b30;
        --shadow: rgba(0, 0, 0, 0.05);
      }
      
      [data-theme="dark"] {
        --bg-primary: #1c1c1e;
        --bg-secondary: #2c2c2e;
        --bg-tertiary: #3a3a3c;
        --bg-item: #3a3a3c;
        --text-primary: #f5f5f7;
        --text-secondary: #e5e5e7;
        --text-tertiary: #98989d;
        --text-muted: #636366;
        --border-color: #48484a;
        --titlebar-bg: #2c2c2e;
        --titlebar-text: #f5f5f7;
        --shadow: rgba(0, 0, 0, 0.3);
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--text-muted);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-tertiary);
      }
      
      html, body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        transition: background 0.2s, color 0.2s;
      }
      /* Titlebar Styles */
      .titlebar {
        height: 32px;
        background: var(--titlebar-bg);
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 9999;
        -webkit-app-region: drag;
        transition: background 0.2s;
      }
      .titlebar-drag-area {
        flex: 1;
        display: flex;
        align-items: center;
        padding-left: 12px;
        gap: 12px;
      }
      .titlebar-title {
        color: var(--titlebar-text);
        font-size: 13px;
        font-weight: 500;
      }
      .titlebar-controls {
        display: flex;
        -webkit-app-region: no-drag;
      }
      .titlebar-btn {
        width: 46px;
        height: 32px;
        border: none;
        background: transparent;
        color: var(--titlebar-text);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
        -webkit-app-region: no-drag;
      }
      .titlebar-btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .titlebar-btn.close:hover {
        background: #ff3b30;
      }
      /* Content Area */
      .content {
        margin-top: 32px;
        height: calc(100vh - 32px);
        overflow-y: auto;
        padding: 20px;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
      }
      h1 {
        text-align: center;
        color: var(--text-primary);
        margin-bottom: 24px;
        margin-top: 0;
        font-size: 1.5rem;
      }
      .back-link {
        display: inline-block;
        color: var(--accent);
        text-decoration: none;
        font-size: 14px;
        margin-bottom: 20px;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      .card {
        background: var(--bg-secondary);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 24px;
        box-shadow: 0 4px 12px var(--shadow);
        transition: background 0.2s, box-shadow 0.2s;
      }
      h2 {
        margin-top: 0;
        font-size: 1.1rem;
        color: var(--text-secondary);
        margin-bottom: 16px;
      }
      .diagnostic-item {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid var(--border-color);
      }
      .diagnostic-item:last-child {
        border-bottom: none;
      }
      .diagnostic-label {
        font-weight: 500;
        color: var(--text-primary);
        flex: 1;
      }
      .diagnostic-value {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .status-badge {
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
      }
      .status-success {
        background: rgba(52, 199, 89, 0.1);
        color: var(--success);
      }
      .status-warning {
        background: rgba(255, 149, 0, 0.1);
        color: var(--warning);
      }
      .status-error {
        background: rgba(255, 59, 48, 0.1);
        color: var(--error);
      }
      .status-info {
        background: rgba(0, 113, 227, 0.1);
        color: var(--accent);
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 12px 20px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: var(--accent-hover);
      }
      button:disabled {
        background: var(--text-muted);
        cursor: not-allowed;
      }
      .btn-secondary {
        background: var(--bg-tertiary);
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
      }
      .btn-secondary:hover {
        background: var(--border-color);
      }
      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }
      .log-area {
        background: var(--bg-tertiary);
        border-radius: 8px;
        padding: 12px;
        font-family: monospace;
        font-size: 12px;
        max-height: 200px;
        overflow-y: auto;
        margin-top: 16px;
        white-space: pre-wrap;
        word-break: break-all;
        color: var(--text-secondary);
      }
      .solution-card {
        background: rgba(0, 113, 227, 0.05);
        border: 1px solid var(--accent);
        border-radius: 8px;
        padding: 16px;
        margin-top: 16px;
      }
      .solution-title {
        font-weight: 600;
        color: var(--accent);
        margin-bottom: 8px;
      }
      .solution-list {
        margin: 0;
        padding-left: 20px;
        color: var(--text-secondary);
      }
      .solution-list li {
        margin-bottom: 6px;
      }
      .theme-controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 20px;
        font-size: 13px;
        color: var(--text-tertiary);
      }
      .theme-btn-page {
        padding: 6px 12px;
        font-size: 12px;
        border-radius: 6px;
        background: var(--bg-tertiary);
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
        cursor: pointer;
        transition: all 0.2s;
      }
      .theme-btn-page:hover {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .theme-btn-page.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        color: var(--text-tertiary);
      }
      .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid var(--border-color);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 10px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="titlebar">
      <div class="titlebar-drag-area">
        <span class="titlebar-title">Most Box - 网络诊断</span>
      </div>
      <div class="titlebar-controls">
        <button class="titlebar-btn minimize" id="minimizeBtn" title="最小化">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="2" fill="currentColor"/></svg>
        </button>
        <button class="titlebar-btn maximize" id="maximizeBtn" title="最大化">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button class="titlebar-btn close" id="closeBtn" title="关闭">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </div>
    </div>
    <div class="content">
      <a href="./index.html" class="back-link">← 返回主页面</a>
      <h1>网络诊断</h1>
      
      <div class="theme-controls">
        <span>主题：</span>
        <button class="theme-btn-page" id="themeSystem">跟随系统</button>
        <button class="theme-btn-page" id="themeLight">浅色</button>
        <button class="theme-btn-page" id="themeDark">深色</button>
      </div>

      <div class="card">
        <h2>当前状态</h2>
        <div class="diagnostic-item">
          <div class="diagnostic-label">P2P 节点连接数</div>
          <div class="diagnostic-value">
            <span id="peerCount">-</span>
            <span id="peerStatus" class="status-badge status-info">检查中...</span>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>网络诊断</h2>
        <div id="diagnosticResults">
          <div class="loading" id="loadingIndicator">
            <div class="spinner"></div>
            <span>正在诊断网络...</span>
          </div>
          <div id="resultsContent" class="hidden"></div>
        </div>
        <div class="btn-group">
          <button id="runDiagnosis">开始诊断</button>
        </div>
        <div id="logArea" class="log-area hidden"></div>
      </div>

      <div class="card" id="solutionsCard" style="display: none;">
        <h2>解决方案</h2>
        <div id="solutionsContent"></div>
      </div>

      <script type="module" src="./diagnose.js"></script>
    </div>
  </body>
</html>
