name: 功能请求

description: 为本项目提出想法

body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！请描述你希望看到的内容。

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰简洁地描述该功能。
      placeholder: 描述你希望的功能...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题陈述
      description: 此功能解决了什么问题？
      placeholder: 描述这个功能要解决的问题...

  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案
      description: 你将如何解决这个问题？
      placeholder: 描述你建议的解决方案...

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 你考虑过其他替代解决方案吗？
      placeholder: 描述任何替代方案...

  - type: textarea
    id: additional
    attributes:
      label: 其他上下文
      description: 关于此功能请求的任何其他上下文？
      placeholder: 在此添加任何其他上下文...
