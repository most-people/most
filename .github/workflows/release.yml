name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run frontend smoke tests
        run: npm run test:frontend

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Create release if needed
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "MostBox $GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check published npm version
        id: npm-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "most-box@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-version.outputs.exists != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-win:
    name: Build Windows
    runs-on: windows-latest
    needs: create-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows x64
        run: npm run electron:build:win -- --x64 --publish never

      - name: Upload Windows x64 assets
        shell: bash
        run: |
          shopt -s nullglob
          assets=(dist/*-win-x64-setup.exe dist/*-win-x64-setup.exe.blockmap)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No Windows x64 assets found"
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Build Windows arm64
        run: npm run electron:build:win -- --arm64 --publish never

      - name: Upload Windows arm64 assets
        shell: bash
        run: |
          shopt -s nullglob
          assets=(dist/*-win-arm64-setup.exe dist/*-win-arm64-setup.exe.blockmap)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No Windows arm64 assets found"
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    needs: create-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS
        run: npm run electron:build:mac -- --publish never

      - name: Upload macOS assets
        run: |
          shopt -s nullglob
          assets=(dist/*-mac-*.dmg dist/*-mac-*.dmg.blockmap)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No macOS assets found"
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux
        run: npm run electron:build:linux -- --publish never

      - name: Upload Linux assets
        run: |
          shopt -s nullglob
          assets=(dist/*-linux-*.AppImage)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No Linux assets found"
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  mirror-release:
    name: Mirror release to R2
    runs-on: ubuntu-latest
    needs:
      - publish-npm
      - build-win
      - build-mac
      - build-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download GitHub release assets
        run: gh release download "$GITHUB_REF_NAME" --dir release-assets --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Configure R2 mirror target
        run: |
          bucket="${SECRET_R2_BUCKET:-most-box-releases}"
          public_base_url="${SECRET_R2_PUBLIC_BASE_URL:-https://download.most.box}"

          if [ "$bucket" = "most-box-backup" ]; then
            echo "::error::R2_BUCKET must not reuse api.most.box backup bucket most-box-backup. Use most-box-releases for public release assets."
            exit 1
          fi

          echo "R2_RELEASE_BUCKET=$bucket" >> "$GITHUB_ENV"
          echo "R2_PUBLIC_BASE_URL=$public_base_url" >> "$GITHUB_ENV"
          echo "Mirroring release assets to R2 bucket: $bucket"
          echo "Release public base URL: $public_base_url"
        env:
          SECRET_R2_BUCKET: ${{ secrets.R2_BUCKET }}
          SECRET_R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

      - name: Validate R2 credentials
        run: |
          missing=()
          for name in R2_ACCOUNT_ID R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing GitHub Actions secrets: ${missing[*]}"
            exit 1
          fi
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Create release manifest
        run: |
          node scripts/create-release-manifest.mjs \
            --assets release-assets \
            --tag "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --base-url "$R2_PUBLIC_BASE_URL"

      - name: Install AWS CLI
        run: |
          python -m pip install --user awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure R2 CORS
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          endpoint="https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          cat > r2-cors.json <<'JSON'
          {
            "CORSRules": [
              {
                "AllowedOrigins": [
                  "https://most.box",
                  "https://most-people.com"
                ],
                "AllowedMethods": ["GET", "HEAD"],
                "AllowedHeaders": ["*"],
                "ExposeHeaders": [
                  "Cache-Control",
                  "Content-Length",
                  "Content-Type",
                  "ETag",
                  "Last-Modified"
                ],
                "MaxAgeSeconds": 3600
              }
            ]
          }
          JSON
          aws --endpoint-url "$endpoint" s3api put-bucket-cors \
            --bucket "$R2_RELEASE_BUCKET" \
            --cors-configuration file://r2-cors.json
          aws --endpoint-url "$endpoint" s3api get-bucket-cors \
            --bucket "$R2_RELEASE_BUCKET"
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto

      - name: Upload assets to R2
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          endpoint="https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          aws --endpoint-url "$endpoint" s3 cp release-assets "s3://$R2_RELEASE_BUCKET/releases/$GITHUB_REF_NAME" \
            --recursive \
            --exclude "latest.json" \
            --cache-control "public, max-age=31536000, immutable"
          aws --endpoint-url "$endpoint" s3 cp release-assets/latest.json "s3://$R2_RELEASE_BUCKET/releases/latest.json" \
            --content-type "application/json" \
            --cache-control "public, max-age=60"
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
