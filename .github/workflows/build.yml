name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            architecture: x64
          - os: macos-latest
            platform: mac
            architecture: x64
          - os: macos-latest
            platform: mac
            architecture: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: |
          npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: mostbox-win-${{ github.ref_name }}
          path: packages/desktop/dist/MostBox-*.exe
          retention-days: 30

      - name: Upload macOS artifact
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: mostbox-mac-${{ matrix.architecture }}-${{ github.ref_name }}
          path: packages/desktop/dist/MostBox-*.dmg
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: mostbox-win-${{ github.ref_name }}
          path: dist/win

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mostbox-mac-x64-${{ github.ref_name }}
          path: dist/mac-x64

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mostbox-mac-arm64-${{ github.ref_name }}
          path: dist/mac-arm64

      - name: List downloaded files
        run: ls -laR dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: MostBox ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/win/MostBox-*.exe
            dist/mac-x64/MostBox-*.dmg
            dist/mac-arm64/MostBox-*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
